name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-test-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        run: dotnet test --no-build --verbosity normal

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        if: github.event_name != 'pull_request'
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: docker build -t ghcr.io/${{ github.repository }}:latest -t ghcr.io/${{ github.repository }}:${{ github.sha }} .

      - name: Tag short SHA
        if: github.event_name != 'pull_request'
        run: docker tag ghcr.io/${{ github.repository }}:${{ github.sha }} ghcr.io/${{ github.repository }}:${{ steps.vars.outputs.short_sha }}

      - name: Push latest
        if: github.event_name != 'pull_request'
        run: docker push ghcr.io/${{ github.repository }}:latest

      - name: Push full SHA
        if: github.event_name != 'pull_request'
        run: docker push ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Push short SHA
        if: github.event_name != 'pull_request'
        run: docker push ghcr.io/${{ github.repository }}:${{ steps.vars.outputs.short_sha }}
